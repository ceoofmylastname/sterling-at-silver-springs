<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sterling at Silver Springs — The Restoration Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
    }
    #canvas { display: block; width: 100vw; height: 100vh; }

    /* Cinematic letterbox bars */
    .letterbox {
      position: fixed;
      left: 0;
      right: 0;
      height: 8vh;
      background: #000;
      z-index: 5;
      pointer-events: none;
    }
    .letterbox--top { top: 0; }
    .letterbox--bottom { bottom: 0; }

    /* State indicator — top center */
    .state-pill {
      position: fixed;
      top: calc(8vh + 20px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 24px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .state-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transition: background 0.6s, box-shadow 0.6s;
    }

    /* Bottom HUD */
    .hud {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      pointer-events: none;
    }
    .hud-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 40px 48px;
    }
    .hud-brand {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: rgba(212, 168, 67, 0.7);
      margin-bottom: 6px;
    }
    .hud-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .hud-title span {
      background: linear-gradient(135deg, #D4A843, #f0d78c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hud-subtitle {
      font-size: clamp(13px, 1.5vw, 15px);
      color: rgba(255, 255, 255, 0.5);
      font-weight: 300;
      margin-bottom: 24px;
      max-width: 480px;
    }

    /* Progress scrubber */
    .scrubber {
      pointer-events: auto;
    }
    .scrubber-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 10px;
    }
    .scrubber-track {
      position: relative;
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      cursor: pointer;
      overflow: visible;
    }
    .scrubber-fill {
      height: 100%;
      border-radius: 3px;
      width: 0%;
      background: linear-gradient(90deg, #E63946 0%, #D4A843 50%, #6B9080 100%);
      transition: width 0.08s;
    }
    .scrubber-handle {
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      background: #D4A843;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 16px rgba(212, 168, 67, 0.4);
      transition: left 0.08s, transform 0.15s;
    }
    .scrubber-track:hover .scrubber-handle {
      transform: translate(-50%, -50%) scale(1.3);
    }

    /* Controls hint */
    .hint-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
    }
    .hint-bar kbd {
      display: inline-block;
      padding: 2px 6px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      font-family: inherit;
      font-size: 10px;
    }

    /* Loading */
    .loader {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      transition: opacity 0.8s;
    }
    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader-ring {
      width: 48px;
      height: 48px;
      border: 2px solid rgba(212, 168, 67, 0.15);
      border-top-color: #D4A843;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loader-text {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.4);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 640px) {
      .letterbox { height: 5vh; }
      .hud-inner { padding: 0 24px 36px; }
      .state-pill { top: calc(5vh + 12px); font-size: 11px; padding: 6px 18px; }
      .hint-bar { display: none; }
    }
  </style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Building Scene</div>
</div>

<canvas id="canvas"></canvas>

<div class="letterbox letterbox--top"></div>
<div class="letterbox letterbox--bottom"></div>

<div class="state-pill" id="statePill">
  <span class="state-dot" id="stateDot" style="background: #E63946; box-shadow: 0 0 8px rgba(230,57,70,0.5)"></span>
  <span id="stateText">Neglected</span>
</div>

<div class="hud">
  <div class="hud-inner">
    <div class="hud-brand">Sterling at Silver Springs</div>
    <div class="hud-title">The <span>Restoration</span></div>
    <div class="hud-subtitle">Scroll or drag to witness the transformation from neglected to pristine — the Sterling Standard.</div>
    <div class="scrubber">
      <div class="scrubber-labels">
        <span>Weathered</span>
        <span>The Sterling Standard</span>
      </div>
      <div class="scrubber-track" id="scrubberTrack">
        <div class="scrubber-fill" id="scrubberFill"></div>
        <div class="scrubber-handle" id="scrubberHandle"></div>
      </div>
    </div>
    <div class="hint-bar">
      <span><kbd>Scroll</kbd> Scrub timeline</span>
      <span><kbd>Space</kbd> Play / Pause</span>
      <span><kbd>R</kbd> Reset</span>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// =========================================================
// CONFIGURATION
// =========================================================
const CONFIG = {
  autoPlaySpeed: 0.0012,
  smoothing: 0.045,
  cameraHeight: 5.5,
  cameraDistance: 16,
  cameraDrift: 1.2,
  particleCount: 120,
  starCount: 400,
  waveWidth: 0.2, // width of the "cleansing wave" in progress-space
};

// =========================================================
// RENDERER
// =========================================================
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// =========================================================
// SCENE & CAMERA
// =========================================================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 250);
camera.position.set(0, CONFIG.cameraHeight, CONFIG.cameraDistance);
camera.lookAt(0, 2, 0);

// =========================================================
// PROGRESS STATE
// =========================================================
let progress = 0;
let targetProgress = 0;
let autoPlay = true;
let autoDir = 1;
let time = 0;

// =========================================================
// COLOR SYSTEM — "Modern-Naturalist"
// =========================================================
const C = {
  // Neglected palette — desaturated, cold, flat
  n: {
    sky:       new THREE.Color(0x15151f),
    fog:       new THREE.Color(0x12121a),
    ground:    new THREE.Color(0x2a2518),
    grass:     new THREE.Color(0x3a3820),
    stone:     new THREE.Color(0x484438),
    stoneWet:  new THREE.Color(0x3a3830),
    metal:     new THREE.Color(0x383838),
    sign:      new THREE.Color(0x3e3c34),
    signText:  new THREE.Color(0x4a4840),
    lamp:      new THREE.Color(0xff5522),
    road:      new THREE.Color(0x2a2a2a),
    weed:      new THREE.Color(0x3a4520),
    ambient:   new THREE.Color(0x0d0d18),
    moon:      new THREE.Color(0x3344aa),
  },
  // Pristine palette — warm, saturated, golden hour
  p: {
    sky:       new THREE.Color(0x1a2a4d),
    fog:       new THREE.Color(0x0d1b2a),
    ground:    new THREE.Color(0x2d6a22),
    grass:     new THREE.Color(0x3d8a2a),
    stone:     new THREE.Color(0xd8c8a8),
    stoneWet:  new THREE.Color(0xc8b898),
    metal:     new THREE.Color(0xb8a878),
    sign:      new THREE.Color(0xd4c4a0),
    signText:  new THREE.Color(0xD4A843),
    lamp:      new THREE.Color(0xfff0d0),
    road:      new THREE.Color(0x555555),
    weed:      new THREE.Color(0x4a9a32),
    ambient:   new THREE.Color(0x223355),
    moon:      new THREE.Color(0xfff4e0),
  }
};

function lerp(a, b, t) { return a + (b - a) * t; }
function lc(c1, c2, t) { return new THREE.Color().lerpColors(c1, c2, t); }
function easeInOut(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

// =========================================================
// FOG & SKY
// =========================================================
scene.fog = new THREE.FogExp2(C.n.fog, 0.02);
scene.background = C.n.sky.clone();

// =========================================================
// GROUND
// =========================================================
const groundGeo = new THREE.PlaneGeometry(100, 100, 50, 50);
// Add subtle terrain variation
const gPositions = groundGeo.attributes.position;
for (let i = 0; i < gPositions.count; i++) {
  const x = gPositions.getX(i);
  const z = gPositions.getY(i); // Y in plane space = Z in world
  gPositions.setZ(i, (Math.sin(x * 0.3) * Math.cos(z * 0.3) * 0.15));
}
groundGeo.computeVertexNormals();

const groundMat = new THREE.MeshStandardMaterial({
  color: C.n.ground,
  roughness: 0.95,
  metalness: 0.0,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Road
const roadGeo = new THREE.PlaneGeometry(7, 40);
const roadMat = new THREE.MeshStandardMaterial({ color: C.n.road, roughness: 0.85 });
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
road.position.set(0, 0.015, 8);
road.receiveShadow = true;
scene.add(road);

// Road center line (appears when pristine)
const lineGeo = new THREE.PlaneGeometry(0.15, 36);
const lineMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0,
});
const centerLine = new THREE.Mesh(lineGeo, lineMat);
centerLine.rotation.x = -Math.PI / 2;
centerLine.position.set(0, 0.02, 8);
scene.add(centerLine);

// Sidewalks
[-3.8, 3.8].forEach(x => {
  const swGeo = new THREE.PlaneGeometry(1.5, 30);
  const swMat = new THREE.MeshStandardMaterial({ color: 0x888880, roughness: 0.7 });
  const sw = new THREE.Mesh(swGeo, swMat);
  sw.rotation.x = -Math.PI / 2;
  sw.position.set(x, 0.012, 6);
  sw.receiveShadow = true;
  scene.add(sw);
});

// =========================================================
// MONUMENT BASE — stacked fieldstone
// =========================================================
const monumentGroup = new THREE.Group();

// Foundation slab
const foundGeo = new THREE.BoxGeometry(8, 0.3, 2.4);
const foundMat = new THREE.MeshStandardMaterial({ color: C.n.stone, roughness: 0.75 });
const foundation = new THREE.Mesh(foundGeo, foundMat);
foundation.position.y = 0.15;
foundation.castShadow = true;
foundation.receiveShadow = true;
monumentGroup.add(foundation);

// Main stone body — layered blocks for fieldstone look
const stoneMats = [];
const stoneBlocks = [];
for (let layer = 0; layer < 4; layer++) {
  const y = 0.3 + layer * 0.55;
  const w = 7.2 - layer * 0.3;
  const h = 0.5;
  const d = 2.0 - layer * 0.1;

  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({
    color: C.n.stone,
    roughness: 0.7 + layer * 0.02,
  });
  const block = new THREE.Mesh(geo, mat);
  block.position.y = y + h / 2;
  block.castShadow = true;
  block.receiveShadow = true;
  monumentGroup.add(block);
  stoneMats.push(mat);
  stoneBlocks.push(block);
}

// Cap stone
const capGeo = new THREE.BoxGeometry(7.6, 0.2, 2.3);
const capMat = new THREE.MeshStandardMaterial({ color: C.n.stone, roughness: 0.5 });
const capStone = new THREE.Mesh(capGeo, capMat);
capStone.position.y = 2.6;
capStone.castShadow = true;
monumentGroup.add(capStone);
stoneMats.push(capMat);

// =========================================================
// SIGN FACE — raised lettering area
// =========================================================
const signBackGeo = new THREE.BoxGeometry(5.8, 1.2, 0.08);
const signBackMat = new THREE.MeshStandardMaterial({
  color: C.n.sign,
  roughness: 0.55,
  metalness: 0.05,
});
const signBack = new THREE.Mesh(signBackGeo, signBackMat);
signBack.position.set(0, 1.85, 1.0);
signBack.castShadow = true;
monumentGroup.add(signBack);

// Main text block
const mainTextGeo = new THREE.BoxGeometry(5.2, 0.5, 0.06);
const mainTextMat = new THREE.MeshStandardMaterial({
  color: C.n.signText,
  roughness: 0.25,
  metalness: 0.6,
  emissive: C.n.signText,
  emissiveIntensity: 0.03,
});
const mainText = new THREE.Mesh(mainTextGeo, mainTextMat);
mainText.position.set(0, 1.95, 1.08);
monumentGroup.add(mainText);

// Sub-text line
const subTextGeo = new THREE.BoxGeometry(3.8, 0.18, 0.04);
const subTextMat = new THREE.MeshStandardMaterial({
  color: C.n.signText,
  roughness: 0.3,
  metalness: 0.5,
  emissive: C.n.signText,
  emissiveIntensity: 0.02,
});
const subText = new THREE.Mesh(subTextGeo, subTextMat);
subText.position.set(0, 1.55, 1.08);
monumentGroup.add(subText);

// Bronze medallion
const medallionGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.04, 16);
const medallionMat = new THREE.MeshStandardMaterial({
  color: 0x6a5a3a,
  roughness: 0.35,
  metalness: 0.75,
});
const medallion = new THREE.Mesh(medallionGeo, medallionMat);
medallion.rotation.x = Math.PI / 2;
medallion.position.set(0, 1.3, 1.06);
monumentGroup.add(medallion);

scene.add(monumentGroup);

// =========================================================
// ENTRANCE PILLARS
// =========================================================
const pillars = [];

function createPillar(x) {
  const g = new THREE.Group();
  const mats = [];

  // Base plinth
  const baseGeo = new THREE.BoxGeometry(1.6, 0.35, 1.6);
  const baseMat = new THREE.MeshStandardMaterial({ color: C.n.stone, roughness: 0.7 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = 0.175;
  base.castShadow = true;
  g.add(base);
  mats.push(baseMat);

  // Column — 3 stacked sections for texture
  for (let i = 0; i < 3; i++) {
    const colGeo = new THREE.BoxGeometry(1.2, 1.6, 1.2);
    const colMat = new THREE.MeshStandardMaterial({
      color: C.n.stone,
      roughness: 0.72 - i * 0.02,
    });
    const col = new THREE.Mesh(colGeo, colMat);
    col.position.y = 0.35 + 0.8 + i * 1.6;
    col.castShadow = true;
    col.receiveShadow = true;
    g.add(col);
    mats.push(colMat);
  }

  // Crown molding
  const crownGeo = new THREE.BoxGeometry(1.6, 0.15, 1.6);
  const crownMat = new THREE.MeshStandardMaterial({ color: C.n.stone, roughness: 0.55 });
  const crown = new THREE.Mesh(crownGeo, crownMat);
  crown.position.y = 5.25;
  crown.castShadow = true;
  g.add(crown);
  mats.push(crownMat);

  // Lantern housing
  const housingGeo = new THREE.CylinderGeometry(0.12, 0.18, 0.5, 8);
  const housingMat = new THREE.MeshStandardMaterial({
    color: C.n.metal,
    roughness: 0.3,
    metalness: 0.7,
  });
  const housing = new THREE.Mesh(housingGeo, housingMat);
  housing.position.y = 5.65;
  housing.castShadow = true;
  g.add(housing);

  // Lantern cap
  const lanternCapGeo = new THREE.ConeGeometry(0.2, 0.25, 8);
  const lanternCapMat = new THREE.MeshStandardMaterial({
    color: C.n.metal,
    roughness: 0.35,
    metalness: 0.65,
  });
  const lanternCap = new THREE.Mesh(lanternCapGeo, lanternCapMat);
  lanternCap.position.y = 6.0;
  g.add(lanternCap);

  // Light globe
  const globeGeo = new THREE.SphereGeometry(0.1, 12, 12);
  const globeMat = new THREE.MeshStandardMaterial({
    color: C.n.lamp,
    emissive: C.n.lamp,
    emissiveIntensity: 0.2,
    transparent: true,
    opacity: 0.8,
  });
  const globe = new THREE.Mesh(globeGeo, globeMat);
  globe.position.y = 5.9;
  g.add(globe);

  // Point light
  const pLight = new THREE.PointLight(C.n.lamp, 0.3, 8);
  pLight.position.y = 5.9;
  pLight.castShadow = true;
  pLight.shadow.mapSize.set(512, 512);
  g.add(pLight);

  g.position.x = x;

  pillars.push({
    group: g,
    mats,
    housingMat,
    lanternCapMat,
    globeMat,
    pLight,
  });

  return g;
}

scene.add(createPillar(-4.5));
scene.add(createPillar(4.5));

// =========================================================
// LOW WALLS extending from pillars
// =========================================================
const walls = [];
function createWall(startX, length, dir) {
  const geo = new THREE.BoxGeometry(length, 2.2, 0.5);
  const mat = new THREE.MeshStandardMaterial({ color: C.n.stone, roughness: 0.72 });
  const wall = new THREE.Mesh(geo, mat);
  wall.position.set(startX + (length / 2) * dir, 1.1, 0);
  wall.castShadow = true;
  wall.receiveShadow = true;
  walls.push({ mesh: wall, mat });
  return wall;
}
scene.add(createWall(-5.3, 10, -1));
scene.add(createWall(5.3, 10, 1));

// =========================================================
// NEGLECTED ELEMENTS — cracks, weeds, vine tendrils
// =========================================================
const weeds = [];
const weedSpots = [
  [-2.2, 1.6], [-0.8, 2.0], [1.2, 1.7], [2.6, 1.0],
  [-3.8, 0.7], [3.9, 1.3], [-1.2, -0.4], [0.6, -0.2],
  [-2.8, 2.8], [3.2, 3.0], [-0.3, 3.2], [1.8, 3.6],
  [-4.8, 1.0], [5.2, 0.6], [-1.8, 0.4], [0.4, 0.6],
  [-6, 0.5], [6.5, 0.8], [-3.2, 1.8], [3.8, 2.2],
];

weedSpots.forEach((pos, i) => {
  const h = 0.25 + Math.random() * 0.9;
  const geo = new THREE.ConeGeometry(0.1 + Math.random() * 0.18, h, 4);
  const mat = new THREE.MeshStandardMaterial({ color: C.n.weed, roughness: 0.92 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos[0], h / 2, pos[1]);
  mesh.rotation.z = (Math.random() - 0.5) * 0.25;
  mesh.castShadow = true;
  scene.add(mesh);
  weeds.push({ mesh, mat, h, idx: i });
});

// Vine tendrils on monument (neglected)
const vines = [];
for (let i = 0; i < 6; i++) {
  const vGeo = new THREE.CylinderGeometry(0.02, 0.04, 0.8 + Math.random() * 1.2, 4);
  const vMat = new THREE.MeshStandardMaterial({
    color: 0x2a3a15,
    roughness: 0.9,
    transparent: true,
    opacity: 1,
  });
  const vine = new THREE.Mesh(vGeo, vMat);
  vine.position.set(
    -2.5 + Math.random() * 5,
    1.0 + Math.random() * 1.5,
    1.05
  );
  vine.rotation.z = (Math.random() - 0.5) * 0.6;
  scene.add(vine);
  vines.push({ mesh: vine, mat: vMat });
}

// =========================================================
// PRISTINE LANDSCAPING — hedges, flowers, mulch beds
// =========================================================
const hedges = [];
const hedgeSpots = [
  // Flanking monument
  [-2.8, 1.4], [-1.8, 1.6], [1.8, 1.6], [2.8, 1.4],
  // Along walls
  [-6, 0.9], [-7, 1.0], [-8, 0.8],
  [6, 0.9], [7, 1.0], [8, 0.8],
  // Along sidewalks
  [-4, 2.2], [4, 2.2],
];

hedgeSpots.forEach((pos, i) => {
  const size = 0.35 + Math.random() * 0.35;
  const geo = new THREE.SphereGeometry(size, 10, 10);
  const mat = new THREE.MeshStandardMaterial({ color: 0x2d7a22, roughness: 0.88 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos[0], 0, pos[1]);
  mesh.scale.set(0, 0, 0);
  mesh.castShadow = true;
  scene.add(mesh);
  hedges.push({ mesh, size, idx: i });
});

// Ornamental trees (Japanese maple silhouette)
const ornTrees = [];
[-3.5, 3.5].forEach((x, i) => {
  const trunkGeo = new THREE.CylinderGeometry(0.06, 0.1, 1.8, 6);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.9 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.set(x, 0, 2.5);
  trunk.scale.set(0, 0, 0);
  trunk.castShadow = true;
  scene.add(trunk);

  const canopyGeo = new THREE.SphereGeometry(0.9, 10, 8);
  const canopyMat = new THREE.MeshStandardMaterial({ color: 0x6a1a2a, roughness: 0.85 });
  const canopy = new THREE.Mesh(canopyGeo, canopyMat);
  canopy.position.set(x, 1.9, 2.5);
  canopy.scale.set(0, 0, 0);
  canopy.castShadow = true;
  scene.add(canopy);

  ornTrees.push({ trunk, canopy, idx: i });
});

// Flowers
const flowers = [];
const flowerPalette = [0xE63946, 0xD4A843, 0xffffff, 0xff8fab, 0x8ecae6, 0xb5a8d5];
for (let i = 0; i < 30; i++) {
  const side = i < 15 ? -1 : 1;
  const x = side * (1.5 + Math.random() * 6);
  const z = 0.6 + Math.random() * 3.5;
  const geo = new THREE.SphereGeometry(0.06 + Math.random() * 0.05, 6, 6);
  const color = flowerPalette[Math.floor(Math.random() * flowerPalette.length)];
  const mat = new THREE.MeshStandardMaterial({
    color,
    emissive: color,
    emissiveIntensity: 0.08,
    roughness: 0.7,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, 0.08, z);
  mesh.scale.set(0, 0, 0);
  scene.add(mesh);
  flowers.push({ mesh, idx: i });
}

// =========================================================
// PATH LIGHTS — pristine walkway illumination
// =========================================================
const pathLights = [];
for (let i = 0; i < 8; i++) {
  const side = i % 2 === 0 ? -1 : 1;
  const z = 1.5 + i * 2;

  const poleGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.7, 6);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x8a7a5a, metalness: 0.6, roughness: 0.35 });
  const pole = new THREE.Mesh(poleGeo, poleMat);
  pole.position.set(side * 2.8, 0.35, z);
  pole.scale.set(0, 0, 0);
  scene.add(pole);

  const lampGeo = new THREE.SphereGeometry(0.08, 8, 8);
  const lampMat = new THREE.MeshStandardMaterial({
    color: 0xfff4e0,
    emissive: 0xfff4e0,
    emissiveIntensity: 0,
  });
  const lamp = new THREE.Mesh(lampGeo, lampMat);
  lamp.position.set(side * 2.8, 0.75, z);
  lamp.scale.set(0, 0, 0);
  scene.add(lamp);

  const pL = new THREE.PointLight(0xfff4e0, 0, 5);
  pL.position.set(side * 2.8, 0.75, z);
  scene.add(pL);

  pathLights.push({ pole, lamp, lampMat, pL, idx: i });
}

// =========================================================
// MONUMENT UPLIGHTS (pristine — illuminate the sign from below)
// =========================================================
const uplights = [];
[-1.5, 0, 1.5].forEach((x, i) => {
  const uL = new THREE.SpotLight(0xfff0d0, 0, 10, Math.PI / 8, 0.6);
  uL.position.set(x, 0.1, 1.5);
  uL.target.position.set(x, 2, 1.0);
  scene.add(uL);
  scene.add(uL.target);
  uplights.push(uL);
});

// LED strip on cap (pristine)
const ledStripGeo = new THREE.BoxGeometry(7.2, 0.03, 0.03);
const ledStripMat = new THREE.MeshStandardMaterial({
  color: 0xD4A843,
  emissive: 0xD4A843,
  emissiveIntensity: 0,
  transparent: true,
  opacity: 0,
});
const ledStrip = new THREE.Mesh(ledStripGeo, ledStripMat);
ledStrip.position.set(0, 2.72, 1.1);
monumentGroup.add(ledStrip);

// =========================================================
// CLEANSING WAVE — visible golden light plane
// =========================================================
const waveGeo = new THREE.PlaneGeometry(0.3, 12);
const waveMat = new THREE.MeshBasicMaterial({
  color: 0xD4A843,
  transparent: true,
  opacity: 0,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
});
const wavePlane = new THREE.Mesh(waveGeo, waveMat);
wavePlane.position.set(0, 3, 2);
wavePlane.rotation.y = Math.PI / 2;
scene.add(wavePlane);

// Wave point light
const waveLight = new THREE.PointLight(0xD4A843, 0, 8);
waveLight.position.set(0, 3, 2);
scene.add(waveLight);

// =========================================================
// LIGHTING
// =========================================================
const ambientLight = new THREE.AmbientLight(C.n.ambient, 0.35);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(C.n.moon, 0.2);
dirLight.position.set(-10, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Golden hour fill (ramps up with progress)
const goldenLight = new THREE.DirectionalLight(0xffeac0, 0);
goldenLight.position.set(8, 8, 6);
scene.add(goldenLight);

// Rim light from behind
const rimLight = new THREE.DirectionalLight(0xffcc88, 0);
rimLight.position.set(-3, 5, -8);
scene.add(rimLight);

// =========================================================
// PARTICLES — fireflies → golden dust
// =========================================================
const pCount = CONFIG.particleCount;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(pCount * 3);
const pData = [];
for (let i = 0; i < pCount; i++) {
  pPos[i * 3] = (Math.random() - 0.5) * 22;
  pPos[i * 3 + 1] = 0.3 + Math.random() * 7;
  pPos[i * 3 + 2] = (Math.random() - 0.5) * 16;
  pData.push({
    vx: (Math.random() - 0.5) * 0.008,
    vy: (Math.random() - 0.5) * 0.004,
    vz: (Math.random() - 0.5) * 0.008,
    phase: Math.random() * Math.PI * 2,
  });
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));

const pMat = new THREE.PointsMaterial({
  color: 0x88ff44,
  size: 0.05,
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

// =========================================================
// STARS
// =========================================================
const sCount = CONFIG.starCount;
const sGeo = new THREE.BufferGeometry();
const sPos = new Float32Array(sCount * 3);
for (let i = 0; i < sCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.random() * Math.PI * 0.35;
  const r = 70 + Math.random() * 40;
  sPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  sPos[i * 3 + 1] = r * Math.cos(phi) + 15;
  sPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
}
sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
const sMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.12,
  transparent: true,
  opacity: 0.6,
});
const stars = new THREE.Points(sGeo, sMat);
scene.add(stars);

// =========================================================
// SCENE UPDATE
// =========================================================
function updateScene() {
  const p = progress;
  const t = time;

  // Sky, fog, exposure
  scene.background.copy(lc(C.n.sky, C.p.sky, p));
  scene.fog.color.copy(lc(C.n.fog, C.p.fog, p));
  scene.fog.density = 0.02 - p * 0.01;
  renderer.toneMappingExposure = 0.9 + p * 0.6;

  // Ground
  groundMat.color.copy(lc(C.n.ground, C.p.ground, p));

  // Road
  roadMat.color.copy(lc(C.n.road, C.p.road, p));
  roadMat.roughness = 0.85 - p * 0.25;

  // Center line
  lineMat.opacity = Math.max(0, (p - 0.5) * 2) * 0.6;

  // Monument stones
  const stoneC = lc(C.n.stone, C.p.stone, p);
  const stoneR = 0.75 - p * 0.25;
  stoneMats.forEach(m => { m.color.copy(stoneC); m.roughness = stoneR; });
  foundMat.color.copy(stoneC);
  foundMat.roughness = stoneR;

  // Sign
  signBackMat.color.copy(lc(C.n.sign, C.p.sign, p));
  signBackMat.roughness = 0.55 - p * 0.15;

  mainTextMat.color.copy(lc(C.n.signText, C.p.signText, p));
  mainTextMat.emissive.copy(lc(C.n.signText, C.p.signText, p));
  mainTextMat.emissiveIntensity = 0.03 + p * 0.7;
  mainTextMat.metalness = 0.4 + p * 0.4;
  mainTextMat.roughness = 0.35 - p * 0.2;

  subTextMat.color.copy(lc(C.n.signText, C.p.signText, p));
  subTextMat.emissive.copy(lc(C.n.signText, C.p.signText, p));
  subTextMat.emissiveIntensity = 0.02 + p * 0.5;

  // Medallion
  medallionMat.metalness = 0.5 + p * 0.3;
  medallionMat.roughness = 0.5 - p * 0.2;
  medallionMat.color.copy(lc(new THREE.Color(0x4a3a2a), new THREE.Color(0x8a7a4a), p));

  // LED strip on cap
  ledStripMat.emissiveIntensity = Math.max(0, (p - 0.6)) * 3;
  ledStripMat.opacity = Math.max(0, (p - 0.6)) * 2.5;

  // Pillars
  pillars.forEach(pl => {
    pl.mats.forEach(m => { m.color.copy(stoneC); m.roughness = stoneR; });
    pl.housingMat.color.copy(lc(C.n.metal, C.p.metal, p));
    pl.housingMat.roughness = 0.4 - p * 0.2;
    pl.housingMat.metalness = 0.6 + p * 0.2;
    pl.lanternCapMat.color.copy(lc(C.n.metal, C.p.metal, p));

    // Light flicker (neglected) → warm steady (pristine)
    const flicker = (1 - p) * (0.15 + Math.sin(t * 7 + Math.random()) * 0.12 + Math.sin(t * 11) * 0.08);
    const steady = p * 1.5;
    const intensity = flicker + steady;

    pl.globeMat.emissive.copy(lc(C.n.lamp, C.p.lamp, p));
    pl.globeMat.emissiveIntensity = intensity;
    pl.globeMat.color.copy(lc(C.n.lamp, C.p.lamp, p));
    pl.pLight.color.copy(lc(C.n.lamp, C.p.lamp, p));
    pl.pLight.intensity = flicker * 2 + steady * 3.5;
    pl.pLight.distance = 6 + p * 8;
  });

  // Walls
  walls.forEach(w => { w.mat.color.copy(stoneC); w.mat.roughness = stoneR; });

  // Weeds — shrink and vanish
  weeds.forEach(w => {
    const wp = Math.max(0, 1 - p * 2.5 + w.idx * 0.04);
    w.mesh.scale.set(wp, wp, wp);
    w.mesh.position.y = (w.h / 2) * wp;
    w.mat.color.copy(lc(C.n.weed, C.p.weed, p));
    w.mesh.rotation.z = Math.sin(t * 1.8 + w.idx) * 0.08 * wp;
  });

  // Vines — fade out
  vines.forEach((v, i) => {
    v.mat.opacity = Math.max(0, 1 - p * 3);
    v.mesh.visible = v.mat.opacity > 0.01;
  });

  // Hedges — grow in
  hedges.forEach(h => {
    const hp = Math.max(0, Math.min(1, (p - 0.25 - h.idx * 0.025) * 3));
    const s = hp * h.size * 2.2;
    h.mesh.scale.set(s, s * 0.65, s);
    h.mesh.position.y = s * 0.25;
    h.mesh.rotation.y = Math.sin(t * 0.4 + h.idx) * 0.04;
  });

  // Ornamental trees
  ornTrees.forEach(ot => {
    const tp = Math.max(0, Math.min(1, (p - 0.4) * 2.5));
    ot.trunk.scale.set(tp, tp, tp);
    ot.canopy.scale.set(tp, tp * 0.8, tp);
    ot.canopy.position.y = 1.9 * tp;
    ot.canopy.rotation.y = Math.sin(t * 0.3 + ot.idx) * 0.03 * tp;
  });

  // Flowers — pop in late
  flowers.forEach(f => {
    const fp = Math.max(0, Math.min(1, (p - 0.45 - f.idx * 0.008) * 4));
    f.mesh.scale.set(fp, fp, fp);
    f.mesh.position.y = 0.08 + fp * 0.12 + Math.sin(t * 1.5 + f.idx * 0.4) * 0.015 * fp;
  });

  // Path lights
  pathLights.forEach(pl => {
    const pp = Math.max(0, Math.min(1, (p - 0.35 - pl.idx * 0.04) * 3));
    pl.pole.scale.set(pp, pp, pp);
    pl.lamp.scale.set(pp, pp, pp);
    pl.lampMat.emissiveIntensity = pp * 1.8;
    pl.pL.intensity = pp * 0.6;
  });

  // Uplights
  uplights.forEach(u => { u.intensity = Math.max(0, (p - 0.4)) * 3; });

  // Lighting
  ambientLight.intensity = 0.35 + p * 0.4;
  ambientLight.color.copy(lc(C.n.ambient, C.p.ambient, p));
  dirLight.intensity = 0.2 + p * 0.3;
  dirLight.color.copy(lc(C.n.moon, C.p.moon, p));
  goldenLight.intensity = p * 0.7;
  rimLight.intensity = p * 0.3;

  // Cleansing wave
  const waveActive = p > 0.05 && p < 0.95;
  const waveX = (p - 0.5) * 20; // map progress to x position
  wavePlane.position.x = waveX;
  waveLight.position.x = waveX;
  waveMat.opacity = waveActive ? 0.15 + Math.sin(t * 4) * 0.05 : 0;
  waveLight.intensity = waveActive ? 2 + Math.sin(t * 3) * 0.5 : 0;

  // Particles
  pMat.color.copy(lc(new THREE.Color(0x88ff44), new THREE.Color(0xD4A843), p));
  pMat.size = 0.05 + p * 0.04;
  pMat.opacity = 0.35 + p * 0.35;
  const positions = pGeo.attributes.position.array;
  for (let i = 0; i < pCount; i++) {
    const d = pData[i];
    positions[i * 3] += d.vx + Math.sin(t + d.phase) * 0.002;
    positions[i * 3 + 1] += Math.sin(t * 0.4 + d.phase) * 0.002;
    positions[i * 3 + 2] += d.vz + Math.cos(t + d.phase) * 0.002;
    if (positions[i * 3] > 11) positions[i * 3] = -11;
    if (positions[i * 3] < -11) positions[i * 3] = 11;
    if (positions[i * 3 + 2] > 10) positions[i * 3 + 2] = -6;
    if (positions[i * 3 + 2] < -6) positions[i * 3 + 2] = 10;
  }
  pGeo.attributes.position.needsUpdate = true;

  // Camera drift
  const drift = CONFIG.cameraDrift;
  camera.position.x = Math.sin(t * 0.12) * drift;
  camera.position.y = CONFIG.cameraHeight + Math.sin(t * 0.08) * 0.4 + p * 0.8;
  camera.position.z = CONFIG.cameraDistance - p * 1.5;
  camera.lookAt(0, 2.2 + p * 0.4, 0);

  // Stars
  sMat.opacity = 0.4 + Math.sin(t * 0.25) * 0.15 + p * 0.25;
}

// =========================================================
// UI
// =========================================================
const scrubberTrack = document.getElementById('scrubberTrack');
const scrubberFill = document.getElementById('scrubberFill');
const scrubberHandle = document.getElementById('scrubberHandle');
const statePill = document.getElementById('statePill');
const stateText = document.getElementById('stateText');
const stateDot = document.getElementById('stateDot');

let dragging = false;

function updateUI() {
  const pct = progress * 100;
  scrubberFill.style.width = pct + '%';
  scrubberHandle.style.left = pct + '%';

  if (progress < 0.3) {
    stateText.textContent = 'Neglected';
    stateDot.style.background = '#E63946';
    stateDot.style.boxShadow = '0 0 8px rgba(230,57,70,0.5)';
  } else if (progress < 0.65) {
    stateText.textContent = 'Restoring\u2026';
    stateDot.style.background = '#D4A843';
    stateDot.style.boxShadow = '0 0 8px rgba(212,168,67,0.5)';
  } else {
    stateText.textContent = 'The Sterling Standard';
    stateDot.style.background = '#6B9080';
    stateDot.style.boxShadow = '0 0 8px rgba(107,144,128,0.5)';
  }
}

// Scrubber drag
function startDrag(e) {
  dragging = true;
  autoPlay = false;
  updateDrag(e);
}
function updateDrag(e) {
  if (!dragging) return;
  const rect = scrubberTrack.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  targetProgress = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
}
function stopDrag() { dragging = false; }

scrubberTrack.addEventListener('mousedown', startDrag);
scrubberTrack.addEventListener('touchstart', startDrag, { passive: true });
window.addEventListener('mousemove', updateDrag);
window.addEventListener('touchmove', updateDrag, { passive: true });
window.addEventListener('mouseup', stopDrag);
window.addEventListener('touchend', stopDrag);

// Scroll control
window.addEventListener('wheel', (e) => {
  autoPlay = false;
  targetProgress = Math.max(0, Math.min(1, targetProgress + e.deltaY * 0.0008));
}, { passive: true });

// Keyboard
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    autoPlay = !autoPlay;
  }
  if (e.code === 'KeyR') {
    targetProgress = 0;
    autoPlay = false;
  }
  if (e.code === 'ArrowRight') {
    autoPlay = false;
    targetProgress = Math.min(1, targetProgress + 0.02);
  }
  if (e.code === 'ArrowLeft') {
    autoPlay = false;
    targetProgress = Math.max(0, targetProgress - 0.02);
  }
});

// Double-click toggle autoplay
canvas.addEventListener('dblclick', () => { autoPlay = !autoPlay; });

// =========================================================
// RENDER LOOP
// =========================================================
function animate() {
  requestAnimationFrame(animate);

  time = performance.now() * 0.001;

  // Auto-play
  if (autoPlay) {
    targetProgress += autoDir * CONFIG.autoPlaySpeed;
    if (targetProgress >= 1) { targetProgress = 1; autoDir = -1; }
    if (targetProgress <= 0) { targetProgress = 0; autoDir = 1; }
  }

  // Smooth interpolation
  progress += (targetProgress - progress) * CONFIG.smoothing;
  progress = Math.max(0, Math.min(1, progress));

  updateScene();
  updateUI();
  renderer.render(scene, camera);
}

// =========================================================
// INIT
// =========================================================
function init() {
  animate();
  // Hide loader
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 800);
}

init();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
